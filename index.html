<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>みんなのNISA - ポートフォリオ公開SNS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2ecc71; --sp-color: #f39c12; --cash-color: #bdc3c7; --accent: #4285F4; --bg: #f8fafc; }
        body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background-color: var(--bg); margin: 0; color: #1e293b; display: flex; justify-content: center; min-height: 100vh; padding-bottom: 80px; }
        .app-container { width: 100%; max-width: 480px; position: relative; }
        
        .header { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.1rem; font-weight: 900; color: var(--primary); }
        .user-icon { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #eee; }

        .card { background: white; margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        /* ① グラフを中央に寄せる設定 */
        .chart-box { position: relative; width: 240px; height: 240px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #f1f5f9; padding: 12px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #64748b; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 0.9rem; font-weight: bold; }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; width: calc(100% - 30px); margin: 0 15px; cursor: pointer; font-size: 1rem; }

        /* ⑤ ナビゲーションをシンプルに */
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: 70px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; margin-bottom: 4px; }
        .nav-label { font-size: 0.6rem; font-weight: bold; }

        #chat-messages { padding: 10px; }
        .msg-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid #f1f5f9; }
        .input-bar { position: fixed; bottom: 70px; width: 100%; max-width: 480px; background: white; padding: 12px 15px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; box-sizing: border-box; }
        #chat-input { flex: 1; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; outline: none; }

        #settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; }
        .modal-content { position: absolute; bottom: 0; background: white; width: 100%; padding: 25px; border-radius: 25px 25px 0 0; max-height: 85vh; overflow-y: auto; box-sizing: border-box; }
        .input-item { margin-bottom: 15px; }
        .input-item label { font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .input-item input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo">みんなのNISA</div>
        <img id="user-avatar" class="user-icon hidden" onclick="showSettings()" src="" alt="me">
    </header>

    <div id="login-section" class="card" style="margin-top: 50px; text-align: center;">
        <h2 style="margin-top:0;">投資の「リアル」を共有。</h2>
        <button id="btn-login" class="btn-primary" style="background:#333; width:100%; margin:0;">Googleではじめる</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="card">
            <div style="text-align: center; font-size: 0.7rem; color: #64748b;">ポートフォリオ構成</div>
            <div class="chart-box">
                <canvas id="myChart"></canvas>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-label">③ 金融資産比率</span><div id="risk-ratio-val" class="stat-value">0%</div></div>
                <div class="stat-box"><span class="stat-label">合計資産 (非公開可)</span><div id="total-amount-val" class="stat-value">¥0</div></div>
            </div>
        </div>
        <button class="btn-primary" onclick="showSettings()">ポートフォリオを編集する</button>
    </div>

    <div id="chat-content" class="hidden">
        <div id="chat-messages"></div>
        <div class="input-bar">
            <input type="text" id="chat-input" placeholder="今の相場はどう？">
            <button id="chat-send-btn" style="background:var(--accent); color:white; border:none; padding:0 20px; border-radius:10px; font-weight:bold;">送信</button>
        </div>
    </div>

    <nav class="nav-bar hidden" id="global-nav">
        <div class="nav-item active" id="nav-main" onclick="switchTab('main')">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l3-3 4 4 7-7"/></svg>
            <span class="nav-label">マイ資産</span>
        </div>
        <div class="nav-item" id="nav-chat" onclick="switchTab('chat')">
            <svg class="nav-svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="nav-label">掲示板</span>
        </div>
    </nav>
</div>

<div id="settings-modal" onclick="hideSettings()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0;">ポートフォリオ設定</h3>
        <div class="input-item"><label>ニックネーム</label><input type="text" id="set-nickname"></div>
        <div class="input-item"><label><input type="checkbox" id="set-show-amount"> 合計金額を公開する</label></div>
        <div class="input-item"><label>全世界株式 (円)</label><input type="number" id="set-ac"></div>
        <div class="input-item"><label>米国株式 S&P500 (円)</label><input type="number" id="set-sp"></div>
        <div class="input-item"><label>現預金 (円)</label><input type="number" id="set-cash"></div>
        <button class="btn-primary" onclick="saveSettings()" style="width:100%; margin:0;">保存</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update, onValue, push, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALG070NijPZ0U5RdfMXF_4dIJrEoFELqY",
        authDomain: "nisa-kane-no-naru-ki.firebaseapp.com",
        databaseURL: "https://nisa-kane-no-naru-ki-default-rtdb.firebaseio.com",
        projectId: "nisa-kane-no-naru-ki",
        appId: "1:466336366620:web:7fd41d4742cfbc56fc5fd9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let myChart = null;

    // ④ 中央にテキストを表示するプラグイン
    const centerTextPlugin = {
        id: 'centerText',
        afterDraw(chart) {
            const { ctx, chartArea: { top, bottom, left, right, width, height } } = chart;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // ラベル
            ctx.font = 'bold 12px sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('推定利率', width / 2, height / 2 - 15);
            
            // 利率の値
            ctx.font = '900 24px sans-serif';
            ctx.fillStyle = '#1e293b';
            ctx.fillText(chart.config.options.elements.center.text, width / 2, height / 2 + 10);
            ctx.restore();
        }
    };
    Chart.register(centerTextPlugin);

    window.switchTab = (tab) => {
        document.getElementById('main-content').classList.toggle('hidden', tab !== 'main');
        document.getElementById('chat-content').classList.toggle('hidden', tab !== 'chat');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`nav-${tab}`).classList.add('active');
    };

    onAuthStateChanged(auth, user => {
        if(user) {
            currentUser = user;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('global-nav').classList.remove('hidden');
            document.getElementById('user-avatar').classList.remove('hidden').src = user.photoURL;
            loadUserData();
            initChat();
        }
    });

    async function loadUserData() {
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        updateMyUI(snap.val() || {});
    }

    function updateMyUI(data) {
        const ac = data.ac || 0;
        const sp = data.sp || 0;
        const cash = data.cash || 0;
        const total = ac + sp + cash;

        // ④ 推定利率の簡易計算 (全世界:5%, SP500:8%, 現金:0% と仮定)
        const estimatedRate = total ? (((ac * 0.05) + (sp * 0.08)) / total * 100).toFixed(1) : "0.0";

        document.getElementById('total-amount-val').innerText = `¥${total.toLocaleString()}`;
        document.getElementById('risk-ratio-val').innerText = total ? Math.round(((ac + sp) / total) * 100) + "%" : "0%";

        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['全世界', 'S&P500', '現金'], // ② 順序固定
                datasets: [{ 
                    data: [ac, sp, cash], 
                    backgroundColor: ['#2ecc71', '#f39c12', '#bdc3c7'], 
                    borderWidth: 0 
                }]
            },
            options: { 
                cutout: '80%', 
                plugins: { legend: { display: false } },
                elements: { center: { text: estimatedRate + "%" } } 
            }
        });
    }

    window.saveSettings = async () => {
        const updates = {
            nickname: document.getElementById('set-nickname').value || currentUser.displayName,
            showAmount: document.getElementById('set-show-amount').checked,
            ac: parseInt(document.getElementById('set-ac').value) || 0,
            sp: parseInt(document.getElementById('set-sp').value) || 0,
            cash: parseInt(document.getElementById('set-cash').value) || 0,
        };
        await update(ref(db, `users/${currentUser.uid}`), updates);
        hideSettings();
        loadUserData();
    };

    window.showSettings = async () => {
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        const d = snap.val() || {};
        document.getElementById('set-nickname').value = d.nickname || "";
        document.getElementById('set-show-amount').checked = d.showAmount || false;
        document.getElementById('set-ac').value = d.ac || 0;
        document.getElementById('set-sp').value = d.sp || 0;
        document.getElementById('set-cash').value = d.cash || 0;
        document.getElementById('settings-modal').style.display = 'block';
    };
    window.hideSettings = () => document.getElementById('settings-modal').style.display = 'none';

    function initChat() {
        onValue(query(ref(db, 'messages/room_0'), limitToLast(30)), (snap) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const total = (m.ac||0) + (m.sp||0) + (m.cash||0);
                const financialRatio = total ? Math.round(((m.ac + m.sp) / total) * 100) : 0;
                const amt = m.showAmount ? `(資産:¥${total.toLocaleString()})` : "";
                const div = document.createElement('div');
                div.className = 'msg-card';
                div.innerHTML = `<div style="font-size:0.7rem; color:#64748b; margin-bottom:5px;"><strong>${m.nickname}</strong> / 金融資産比率: ${financialRatio}% ${amt}</div><div style="font-size:0.9rem;">${m.text}</div>`;
                container.prepend(div);
            });
        });
    }

    document.getElementById('chat-send-btn').onclick = async () => {
        const input = document.getElementById('chat-input');
        if(!input.value.trim()) return;
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        const u = snap.val() || {};
        await push(ref(db, 'messages/room_0'), {
            nickname: u.nickname || currentUser.displayName,
            text: input.value, ac: u.ac||0, sp: u.sp||0, cash: u.cash||0,
            showAmount: u.showAmount||false, timestamp: serverTimestamp()
        });
        input.value = "";
    };

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
</script>
</body>
</html>
