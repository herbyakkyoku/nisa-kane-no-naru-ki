<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update, onValue, push, serverTimestamp, query, limitToLast, onChildAdded, runTransaction, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- Firebase設定（航さんのものをここに） ---
    const firebaseConfig = {
        apiKey: "AIzaSyALG070NijPZ0U5RdfMXF_4dIJrEoFELqY",
        authDomain: "nisa-kane-no-naru-ki.firebaseapp.com",
        databaseURL: "https://nisa-kane-no-naru-ki-default-rtdb.firebaseio.com",
        projectId: "nisa-kane-no-naru-ki",
        appId: "1:466336366620:web:7fd41d4742cfbc56fc5fd9"
    };
    // ------------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let currentUser = null;
    let replyingToId = null; // 返信先のIDを保持

    // --- メッセージ表示ロジックの強化 ---
    function initChat(days) {
        let roomId = days >= 100 ? "room_100" : (days >= 30 ? "room_30" : "room_0");
        if (currentRoomId === roomId) return;
        currentRoomId = roomId;

        const chatDisplay = document.getElementById('chat-messages');
        chatDisplay.innerHTML = "";

        // 全メッセージをリアルタイム監視
        const chatRef = query(ref(db, `messages/${roomId}`), limitToLast(50));
        onValue(chatRef, (snapshot) => {
            chatDisplay.innerHTML = "";
            snapshot.forEach((child) => {
                const msgId = child.key;
                const msg = child.val();
                
                // 通常の投稿のみ表示（返信はスレッド内で表示するため、一旦親がいないものだけ表示）
                if (!msg.parentId) {
                    renderMessage(msgId, msg, chatDisplay);
                }
            });
        });
    }

    function renderMessage(msgId, msg, container) {
        const msgEl = document.createElement('div');
        msgEl.className = 'msg-unit';
        const likes = msg.likes ? Object.keys(msg.likes).length : 0;
        const dislikes = msg.dislikes ? Object.keys(msg.dislikes).length : 0;
        const commentCount = msg.commentCount || 0;

        msgEl.innerHTML = `
            <div class="msg-header">
                <span class="user-name">${msg.name}</span>
                <span class="user-meta">${msg.days}日 / ${msg.isPrivate ? '非公開' : msg.profit}</span>
            </div>
            <div class="msg-text">${msg.text}</div>
            <div class="msg-actions">
                <span class="comment-btn" onclick="window.setReply('${msgId}', '${msg.name}')">（コメント ${commentCount}）</span>
                <span class="action-btn" onclick="window.handleReaction('likes', '${msgId}')">
                    <svg class="action-icon"><use href="#icon-like"></use></svg> <span class="count">${likes}</span>
                </span>
                <span class="action-btn" onclick="window.handleReaction('dislikes', '${msgId}')">
                    <svg class="action-icon"><use href="#icon-dislike"></use></svg> <span class="count">${dislikes}</span>
                </span>
                <span class="action-btn" onclick="window.shareOnX('${msg.text}')">
                    <svg class="action-icon"><use href="#icon-share"></use></svg>
                </span>
            </div>
            <div id="thread-${msgId}" class="thread-container" style="margin-left: 20px; font-size: 0.75rem; border-left: 2px solid #eee; padding-left: 10px;"></div>
        `;
        container.appendChild(msgEl);

        // スレッド（返信）の読み込み
        loadReplies(msgId);
    }

    // --- 返信の読み込み ---
    function loadReplies(parentId) {
        const replyRef = query(ref(db, `messages/${currentRoomId}`), orderByChild('parentId'), equalTo(parentId));
        onValue(replyRef, (snapshot) => {
            const container = document.getElementById(`thread-${parentId}`);
            if (!container) return;
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const reply = child.val();
                const div = document.createElement('div');
                div.style.marginTop = "5px";
                div.innerHTML = `<strong>${reply.name}:</strong> ${reply.text}`;
                container.appendChild(div);
            });
        });
    }

    // --- 連打防止付きリアクション ---
    window.handleReaction = async (type, msgId) => {
        if (!currentUser) return alert("ログインが必要です");
        const reactionRef = ref(db, `messages/${currentRoomId}/${msgId}/${type}/${currentUser.uid}`);
        
        // 既に押しているかチェック
        const snapshot = await get(reactionRef);
        if (snapshot.exists()) {
            // 既に押してれば取り消し（トグル）
            await set(reactionRef, null);
        } else {
            // 押してなければ自分のUIDを登録
            await set(reactionRef, true);
            // 反対側のリアクションを消す（いいねしたらバッドを消す、等の親切設計）
            const opposite = type === 'likes' ? 'dislikes' : 'likes';
            await set(ref(db, `messages/${currentRoomId}/${msgId}/${opposite}/${currentUser.uid}`), null);
        }
    };

    // --- X（Twitter）共有機能 ---
    window.shareOnX = (text) => {
        const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent('カネノナルキ修行中🌳「' + text + '」')}&hashtags=NISA,カネノナルキ`;
        window.open(url, '_blank');
    };

    // --- 返信モードの設定 ---
    window.setReply = (msgId, name) => {
        replyingToId = msgId;
        const input = document.getElementById('chat-input');
        input.placeholder = `${name}さんへ返信中...`;
        input.focus();
    };

    // --- 投稿送信（コメントカウント対応） ---
    document.getElementById('chat-send-btn').addEventListener('click', async () => {
        const input = document.getElementById('chat-input');
        if (!input.value.trim() || !currentUser) return;

        const newMsgData = {
            uid: currentUser.uid,
            name: currentUser.displayName,
            days: userData.days || 0,
            profit: currentProfit,
            text: input.value,
            timestamp: serverTimestamp(),
            parentId: replyingToId || null // 返信なら親IDを入れる
        };

        await push(ref(db, `messages/${currentRoomId}`), newMsgData);

        // 返信だった場合、親メッセージのカウントを増やす
        if (replyingToId) {
            const countRef = ref(db, `messages/${currentRoomId}/${replyingToId}/commentCount`);
            await runTransaction(countRef, (count) => (count || 0) + 1);
            replyingToId = null;
            input.placeholder = "今の心境を綴れ...";
        }

        input.value = "";
    });
</script>
