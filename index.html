<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>みんなのNISA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 既存のスタイルを維持 */
        :root { --primary: #2ecc71; --bg: #f8f9fa; --text: #2d3436; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; }
        .header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--primary); font-weight: 900; font-size: 1.2rem; }
        .main-card { background: #fff; margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .chart-container { position: relative; height: 260px; margin: 20px auto; width: 260px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item { background: #f1f3f5; padding: 12px; border-radius: 12px; }
        .stat-label { font-size: 0.75rem; color: #636e72; margin-bottom: 4px; }
        .stat-value { font-weight: 800; font-size: 1.1rem; }
        .btn-primary { background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        
        /* 掲示板スタイル */
        .msg-card { background: #fff; margin: 10px 15px; padding: 15px; border-radius: 16px; border: 1px solid #eee; }
        .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; color: #636e72; }
        .mini-chart { width: 50px; height: 50px; flex-shrink: 0; }
        
        /* 設定モーダル */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: #fff; width: 90%; max-width: 450px; margin: 40px auto; border-radius: 24px; padding: 25px; max-height: 85vh; overflow-y: auto; }
        .input-group { margin-bottom: 20px; }
        .input-item { margin-bottom: 15px; }
        .input-item label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .stock-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .btn-add { background: #f1f3f5; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 20px; font-weight: 700; }

        /* 下部ナビ */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 0.7rem; color: #b2bec3; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">みんなのNISA</div>
        <div id="user-icon" style="width:32px; height:32px; border-radius:50%; background:#d1ccc0; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:900;">航</div>
    </div>

    <div id="page-my" class="page">
        <div class="main-card">
            <div style="font-size: 0.8rem; color: #636e72;">あなたのポートフォリオ比率</div>
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">リスク資産比率</div>
                    <div id="risk-ratio-val" class="stat-value">--%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">合計資産</div>
                    <div id="total-amount-val" class="stat-value">¥0</div>
                </div>
            </div>
            <button class="btn-primary" style="margin-top:20px;" onclick="showSettings()">ポートフォリオを編集する</button>
        </div>
    </div>

    <div id="page-board" class="page" style="display:none;">
        <div id="message-list" style="padding-top:10px;"></div>
        <div style="position:fixed; bottom:70px; width:100%; background:#fff; padding:10px; border-top:1px solid #eee; display:flex; gap:10px; box-sizing:border-box;">
            <input type="text" id="chat-input" placeholder="今の相場はどう？" style="flex:1;">
            <button id="chat-send-btn" style="background:#4285F4; color:#fff; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">送信</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">ポートフォリオ設定</h3>
            <div class="input-group">
                <div class="input-item"><label>ニックネーム</label><input type="text" id="set-nickname"></div>
                <div class="input-item" style="display:flex; align-items:center; justify-content:space-between; background:#f1f3f5; padding:10px; border-radius:10px;">
                    <label style="margin:0;">合計金額を公開する</label>
                    <input type="checkbox" id="set-show-amount" style="width:auto;">
                </div>
                <div class="input-item"><label>全世界株式 (万円)</label><input type="number" id="set-ac"></div>
                <div class="input-item"><label>米国株式 S&P500 (万円)</label><input type="number" id="set-sp"></div>
                <div class="input-item"><label>現預金 (万円)</label><input type="number" id="set-cash"></div>
                <div class="input-item"><label>合計評価損益 (円)</label><input type="number" id="set-profit" placeholder="例: 150000"></div>
                
                <label style="font-size:0.85rem; font-weight:700;">個別株・その他</label>
                <div id="stock-list-container"></div>
                <button class="btn-add" onclick="addStockRow()">＋ 銘柄を追加する</button>
            </div>
            <button class="btn-primary" onclick="saveSettings()">保存</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchPage('my')"><div>📉</div>マイ資産</div>
        <div class="nav-item" onclick="switchPage('board')"><div>💬</div>掲示板</div>
    </nav>

<script type="module">
    // Firebaseのインポートと初期化（適宜設定してください）
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, push, onValue, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { /* あなたのコンフィグ */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let currentUser = null;
    let myChart = null;

    // カラーパレット
    const stockColors = ['#9b59b6', '#3498db', '#e74c3c', '#1abc9c', '#f1c40f', '#d35400'];

    // --- ロジック：データ集計とソート ---
    function prepareSortedData(data) {
        const ac = parseInt(data.ac) || 0;
        const sp = parseInt(data.sp) || 0;
        const cash = parseInt(data.cash) || 0;
        const stocks = data.stocks || [];

        // 1. リスク資産（全世界・SP500・個別株）をリスト化
        let riskAssets = [
            { name: '全世界', val: ac, color: '#2ecc71' },
            { name: 'S&P500', val: sp, color: '#f39c12' }
        ];

        stocks.forEach((s, i) => {
            riskAssets.push({
                name: s.name,
                val: (parseInt(s.val) || 0) * 10000,
                color: stockColors[i % stockColors.length]
            });
        });

        // 2. リスク資産を金額が大きい順にソート
        riskAssets.sort((a, b) => b.val - a.val);

        // 3. 最後に現金を結合
        const finalAssets = [...riskAssets, { name: '現金', val: cash, color: '#bdc3c7' }];

        const total = finalAssets.reduce((sum, a) => sum + a.val, 0);
        const riskTotal = riskAssets.reduce((sum, a) => sum + a.val, 0);

        return {
            labels: finalAssets.map(a => a.name),
            values: finalAssets.map(a => a.val),
            colors: finalAssets.map(a => a.color),
            total,
            riskTotal
        };
    }

    // --- UI：中央に「利益額」を表示するプラグイン ---
    const centerTextPlugin = {
        id: 'centerText',
        afterDraw(chart) {
            if (!chart.config.options.elements?.center) return;
            const { ctx, chartArea: { width, height } } = chart;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // ラベル
            ctx.font = 'bold 12px sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('評価損益', width / 2, height / 2 - 15);
            
            // 金額表示
            const profitVal = chart.config.options.elements.center.value;
            ctx.font = '900 22px sans-serif';
            ctx.fillStyle = profitVal >= 0 ? '#ff7675' : '#4285F4'; // プラス赤、マイナス青
            const sign = profitVal >= 0 ? '+' : '';
            ctx.fillText(`${sign}¥${profitVal.toLocaleString()}`, width / 2, height / 2 + 12);
            ctx.restore();
        }
    };
    Chart.register(centerTextPlugin);

    // --- 画面更新ロジック ---
    function updateMyUI(data) {
        const sorted = prepareSortedData(data);
        const profit = parseInt(data.profit) || 0;

        document.getElementById('total-amount-val').innerText = data.showAmount ? `¥${sorted.total.toLocaleString()}` : "非公開";
        document.getElementById('risk-ratio-val').innerText = `${sorted.total ? Math.round((sorted.riskTotal / sorted.total) * 100) : 0}%`;

        const canvas = document.getElementById('myChart');
        if (myChart) myChart.destroy();
        myChart = new Chart(canvas.getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: sorted.labels,
                datasets: [{ data: sorted.values, backgroundColor: sorted.colors, borderWidth: 0 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '75%',
                plugins: { legend: { display: false } },
                elements: { center: { value: profit } }
            }
        });
    }

    // --- 掲示板メッセージ表示 ---
    onValue(ref(db, 'messages/room_0'), (snapshot) => {
        const list = document.getElementById('message-list');
        list.innerHTML = "";
        snapshot.forEach((child) => {
            const m = child.val();
            const sorted = prepareSortedData(m);
            const card = document.createElement('div');
            card.className = "msg-card";
            const canvasId = `chart-${child.key}`;
            const amountText = m.showAmount ? ` / 資産: ¥${sorted.total.toLocaleString()}` : " / 資産: 非公開";
            const profitText = m.profit ? ` / 損益: ${m.profit >= 0 ? '+' : ''}${m.profit.toLocaleString()}` : "";

            card.innerHTML = `
                <div class="msg-header">
                    <div class="mini-chart"><canvas id="${canvasId}"></canvas></div>
                    <div>
                        <div style="font-weight:bold; color:#2d3436;">${m.nickname} <span style="font-weight:normal; font-size:0.7rem; color:#b2bec3;">/ 比率: ${Math.round((sorted.riskTotal/sorted.total)*100)}%${amountText}${profitText}</span></div>
                        <div style="margin-top:4px; font-size:1rem; color:#2d3436;">${m.text}</div>
                    </div>
                </div>
            `;
            list.prepend(card);
            
            // ミニチャート描画（ここでもソート済みデータを使用）
            new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'doughnut',
                data: { datasets: [{ data: sorted.values, backgroundColor: sorted.colors, borderWidth: 0 }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, cutout: '65%',
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        });
    });

    // --- その他、基本的な関数 ---
    window.addStockRow = (name="", val="") => {
        const container = document.getElementById('stock-list-container');
        const row = document.createElement('div');
        row.className = 'stock-row';
        row.innerHTML = `<input type="text" placeholder="銘柄名" value="${name}" style="flex:2;">
                         <input type="number" placeholder="万円" value="${val}" style="flex:1;">
                         <button onclick="this.parentElement.remove()" style="border:none; background:none; color:#ff7675; font-size:1.2rem;">&times;</button>`;
        container.appendChild(row);
    };

    window.saveSettings = async () => {
        const stocks = Array.from(document.querySelectorAll('.stock-row')).map(row => ({
            name: row.querySelectorAll('input')[0].value,
            val: row.querySelectorAll('input')[1].value
        })).filter(s => s.name && s.val);

        await update(ref(db, `users/${currentUser.uid}`), {
            nickname: document.getElementById('set-nickname').value || currentUser.displayName,
            showAmount: document.getElementById('set-show-amount').checked,
            ac: (parseInt(document.getElementById('set-ac').value) || 0) * 10000,
            sp: (parseInt(document.getElementById('set-sp').value) || 0) * 10000,
            cash: (parseInt(document.getElementById('set-cash').value) || 0) * 10000,
            profit: parseInt(document.getElementById('set-profit').value) || 0,
            stocks: stocks
        });
        document.getElementById('settings-modal').style.display = 'none';
    };

    window.showSettings = async () => {
        const snap = await get(ref(db, `users/${currentUser.uid}`));
        const d = snap.val() || {};
        document.getElementById('set-nickname').value = d.nickname || "";
        document.getElementById('set-show-amount').checked = d.showAmount || false;
        document.getElementById('set-ac').value = d.ac ? d.ac / 10000 : "";
        document.getElementById('set-sp').value = d.sp ? d.sp / 10000 : "";
        document.getElementById('set-cash').value = d.cash ? d.cash / 10000 : "";
        document.getElementById('set-profit').value = d.profit || "";
        const container = document.getElementById('stock-list-container');
        container.innerHTML = "";
        if(d.stocks) d.stocks.forEach(s => addStockRow(s.name, s.val));
        document.getElementById('settings-modal').style.display = 'block';
    };

    window.switchPage = (page) => {
        document.getElementById('page-my').style.display = page === 'my' ? 'block' : 'none';
        document.getElementById('page-board').style.display = page === 'board' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach((el, i) => {
            el.classList.toggle('active', (page === 'my' && i === 0) || (page === 'board' && i === 1));
        });
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            onValue(ref(db, `users/${user.uid}`), (snap) => {
                if (snap.exists()) updateMyUI(snap.val());
            });
        } else {
            signInWithPopup(auth, new GoogleAuthProvider());
        }
    });
</script>
</body>
</html>
