<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>カネノナルキ - NISA握力養成所</title>
    <style>
        :root { --primary: #2ecc71; --accent: #4285F4; --money: #f39c12; --bg: #f0f4f8; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; color: #333; display: flex; justify-content: center; min-height: 100vh; padding-bottom: 75px; }
        .app-container { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 480px; margin: 10px; position: relative; align-self: flex-start; }
        .badge { background: #eef4ff; color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.7rem; display: inline-block; margin-bottom: 5px; }
        
        /* 1. アニメーション設定 */
        #tree-display { font-size: 80px; margin: 10px 0; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bounce { transform: scale(1.3) translateY(-20px); }

        .main-stats { display: flex; justify-content: space-around; margin-bottom: 1.5rem; background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #f0f0f0; }
        .stat-item p { margin: 0; font-size: 0.7rem; color: #999; }
        .stat-item div { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .hold-button { background-color: var(--primary); color: white; border: none; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.2s; margin-bottom: 1rem; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2); }
        .hold-button:active { transform: scale(0.98); }
        .hold-button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
        
        #chat-section { border-top: 2px solid #f0f4f8; margin-top: 15px; padding-top: 15px; text-align: left; }
        #chat-messages { height: calc(100vh - 280px); overflow-y: auto; margin-bottom: 85px; padding-right: 5px; }
        .msg-unit { background: white; border: 1px solid #eee; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .input-area { position: fixed; bottom: 65px; left: 0; width: 100%; background: white; padding: 10px 15px; box-sizing: border-box; border-top: 1px solid #eee; z-index: 900; }
        .input-row { display: flex; gap: 8px; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 0.9rem; }
        #chat-send-btn { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .bottom-nav { display: flex; justify-content: space-around; align-items: center; height: 65px; background: #ffffff; border-top: 1px solid #eee; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-icon { width: 24px !important; height: 24px !important; fill: currentColor; margin-bottom: 2px; display: block; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-label { font-size: 10px; font-weight: bold; }

        #settings-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 2rem; box-sizing: border-box; display: none; }
        .settings-list { list-style: none; padding: 0; text-align: left; }
        .settings-list li { padding: 15px 0; border-bottom: 1px solid #eee; font-weight: bold; }
        .settings-list a { color: #333; text-decoration: none; display: block; width: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-section">
        <h1>🌳 カネノナルキ</h1>
        <p>〜NISA握力養成所〜</p>
        <button class="hold-button" id="btn-login" style="background-color: var(--accent);">Googleで入門する</button>
    </div>

    <div id="main-content" class="hidden">
        <div id="user-badge" class="badge">🐣 ひよっこ門下生</div>
        <div id="tree-display">🌱</div>
        <div class="main-stats">
            <div class="stat-item"><p>修行日数</p><div id="day-count">0日</div></div>
            <div class="stat-item"><p>守護額</p><div id="saved-amount">¥0</div></div>
        </div>
        <button class="hold-button" id="hold-btn">今日も売らなかった！</button>
        <p style="font-size: 0.7rem; color: #999;">※売却ボタンはありません。アプリを消すまで修行です。</p>
    </div>

    <div id="chat-content" class="hidden">
        <div id="chat-section">
            <div id="chat-messages"></div>
            <div class="input-area">
                <div id="reply-label" style="font-size:0.7rem; color:var(--accent); margin-bottom:3px; display:none;">返信中: <span id="reply-target-name"></span> <span style="cursor:pointer; color:#999;" onclick="cancelReply()">[取消]</span></div>
                <div class="input-row">
                    <input type="text" id="chat-input" placeholder="今の心境を綴れ...">
                    <button id="chat-send-btn">送信</button>
                </div>
                <label style="font-size: 0.7rem; color: #888; margin-top: 5px; display: block;">
                    <input type="checkbox" id="mask-amount-check"> 金額を隠して投稿
                </label>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav hidden" id="global-nav">
    <div class="nav-item active" id="nav-main" onclick="switchTab('main')">
        <svg class="nav-icon"><use href="#icon-home"></use></svg><span class="nav-label">修行</span>
    </div>
    <div class="nav-item" id="nav-chat" onclick="switchTab('chat')">
        <svg class="nav-icon"><use href="#icon-chat"></use></svg><span class="nav-label">道場</span>
    </div>
    <div class="nav-item" onclick="showSettings()">
        <svg class="nav-icon"><use href="#icon-settings"></use></svg><span class="nav-label">設定</span>
    </div>
</nav>

<div id="settings-modal">
    <h2 style="text-align:center;">⚙️ 設定・規約</h2>
    <ul class="settings-list">
        <li style="color: var(--accent); cursor: pointer;" onclick="requestNotification()">🔔 通知を受け取る（修行忘れ防止）</li>
        <li><a href="#">利用規約</a></li>
        <li><a href="#">プライバシーポリシー</a></li>
        <li style="color: #e74c3c; cursor: pointer;" onclick="auth.signOut(); location.reload();">ログアウト</li>
    </ul>
    <button onclick="hideSettings()" style="width:100%; padding:15px; border-radius:30px; border:none; background:#eee; font-weight:bold; margin-top:20px;">閉じる</button>
</div>

<svg style="display: none;">
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
    <symbol id="icon-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-5H6V7h12v2z"/></symbol>
    <symbol id="icon-money" viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38(1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></symbol>
</svg>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update, onValue, push, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALG070NijPZ0U5RdfMXF_4dIJrEoFELqY",
        authDomain: "nisa-kane-no-naru-ki.firebaseapp.com",
        databaseURL: "https://nisa-kane-no-naru-ki-default-rtdb.firebaseio.com",
        projectId: "nisa-kane-no-naru-ki",
        appId: "1:466336366620:web:7fd41d4742cfbc56fc5fd9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let userData = null;

    // 2. データの永続化: ログイン状態の監視
    onAuthStateChanged(auth, async user => { 
        if(user){ 
            currentUser = user; 
            document.getElementById('login-section').classList.add('hidden'); 
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('global-nav').classList.remove('hidden');
            await loadUserData(); 
        }
    });

    async function loadUserData() {
        const snap = await get(ref(db, 'users/' + currentUser.uid));
        userData = snap.val() || { days: 0, lastPressed: null, monthlyAmount: 33333 };
        updateUI();
        initChat();
    }

    function updateUI() {
        const days = userData.days || 0;
        document.getElementById('day-count').innerText = days + "日";
        const amount = Math.floor(((userData.monthlyAmount / 30) * days) * 1.03);
        document.getElementById('saved-amount').innerText = "¥" + amount.toLocaleString();
        
        const trees = ["🌱", "🌿", "🌲", "🌳", "💹"];
        document.getElementById('tree-display').innerText = trees[Math.min(Math.floor(days/10), 4)];
        
        const today = new Date().toDateString();
        document.getElementById('hold-btn').disabled = (userData.lastPressed === today);
    }

    // 修行ボタンクリック
    document.getElementById('hold-btn').onclick = async () => {
        const tree = document.getElementById('tree-display');
        
        // 1. アニメーション実行
        tree.classList.add('bounce');
        setTimeout(() => tree.classList.remove('bounce'), 300);

        // 2. データの永続化
        const newDays = (userData.days || 0) + 1;
        const today = new Date().toDateString();
        
        await update(ref(db, 'users/' + currentUser.uid), { 
            days: newDays, 
            lastPressed: today 
        });
        
        userData.days = newDays;
        userData.lastPressed = today;
        updateUI();
    };

    // 3. 通知機能のリクエスト（設定画面用）
    window.requestNotification = () => {
        if (!("Notification" in window)) {
            alert("このブラウザは通知に対応していません");
            return;
        }
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                alert("通知がオンになりました！毎日リマインドします（開発中）");
                new Notification("カネノナルキ", { body: "これで修行を忘れることはありません！", icon: "🌱" });
            }
        });
    };

    // タブ切り替えなどは既存のまま
    window.switchTab = (tab) => {
        document.getElementById('main-content').classList.add('hidden');
        document.getElementById('chat-content').classList.add('hidden');
        document.getElementById('nav-main').classList.remove('active');
        document.getElementById('nav-chat').classList.remove('active');
        if(tab === 'main') {
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('nav-main').classList.add('active');
        } else {
            document.getElementById('chat-content').classList.remove('hidden');
            document.getElementById('nav-chat').classList.add('active');
        }
    };

    window.showSettings = () => document.getElementById('settings-modal').style.display = 'block';
    window.hideSettings = () => document.getElementById('settings-modal').style.display = 'none';
    window.auth = auth; // ログアウト用

    // 簡易チャット初期化（ロジックは既存を継承）
    function initChat() { /* 既存のチャットロジック... */ }
    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
</script>
</body>
</html>
