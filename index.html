<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>カネノナルキ - NISA握力養成所</title>
    <style>
        :root { --primary: #2ecc71; --accent: #4285F4; --money: #f39c12; --bg: #f0f4f8; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; color: #333; display: flex; justify-content: center; min-height: 100vh; padding-bottom: 75px; }
        .app-container { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 480px; margin: 10px; position: relative; align-self: flex-start; }
        
        /* 右上アイコン */
        .user-menu-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; border-radius: 50%; overflow: hidden; width: 35px; height: 35px; border: 2px solid #eee; }
        .user-menu-btn img { width: 100%; height: 100%; object-fit: cover; }

        .badge { background: #eef4ff; color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.7rem; display: inline-block; margin-bottom: 5px; margin-top: 10px; }
        #tree-display { font-size: 80px; margin: 10px 0; }
        
        /* 将来予測のスタイル */
        .future-box { background: #fff9eb; border: 1px dashed var(--money); padding: 10px; border-radius: 12px; margin-top: 15px; }
        .future-label { font-size: 0.65rem; color: #d35400; font-weight: bold; }
        .future-amount { font-size: 1.1rem; font-weight: bold; color: var(--money); }

        .main-stats { display: flex; justify-content: space-around; margin-top: 1rem; background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #f0f0f0; }
        .stat-item p { margin: 0; font-size: 0.7rem; color: #999; }
        .stat-item div { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .hold-button { background-color: var(--primary); color: white; border: none; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 1.5rem; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2); }
        .hold-button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
        
        /* 設定モーダル内のフォーム */
        .settings-list { list-style: none; padding: 0; text-align: left; }
        .settings-list li { padding: 12px 0; border-bottom: 1px solid #eee; }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        #settings-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; padding: 2rem; box-sizing: border-box; display: none; overflow-y: auto; }
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; height: 65px; background: #ffffff; border-top: 1px solid #eee; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-section">
        <h1>🌳 カネノナルキ</h1>
        <button class="hold-button" id="btn-login" style="background-color: var(--accent);">Googleで入門する</button>
    </div>

    <div id="main-content" class="hidden">
        <div class="user-menu-btn" onclick="showSettings()">
            <img id="user-photo" src="" alt="👤">
        </div>
        <div id="user-badge" class="badge">🐣 ひよっこ門下生</div>
        <div id="tree-display">🌱</div>
        
        <div class="main-stats">
            <div class="stat-item"><p>修行日数</p><div id="day-count">0日</div></div>
            <div class="stat-item"><p>現在の守護額</p><div id="saved-amount">¥0</div></div>
        </div>

        <div class="future-box">
            <div class="future-label">✨ <span id="target-years-label">20</span>年後の守護予測</div>
            <div class="future-amount" id="future-total">¥0</div>
        </div>

        <button class="hold-button" id="hold-btn">今日も売らなかった！</button>
    </div>

    </div>

<div id="settings-modal">
    <h2 style="text-align:center;">⚙️ 修行設定</h2>
    <div class="settings-list">
        <div class="input-group">
            <label>毎月の積立額 (円)</label>
            <input type="number" id="set-monthly" step="1000">
        </div>
        <div class="input-group">
            <label>初期投資額 (円)</label>
            <input type="number" id="set-initial">
        </div>
        <div class="input-group">
            <label>想定利回り (%)</label>
            <input type="number" id="set-rate" step="0.1">
        </div>
        <div class="input-group">
            <label>目標期間 (年)</label>
            <input type="number" id="set-years">
        </div>
        <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">設定を保存</button>
        <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
        <li style="color: var(--accent); cursor: pointer;" onclick="requestNotification()">🔔 通知設定を有効にする</li>
        <li style="color: #e74c3c; cursor: pointer; margin-top: 20px;" onclick="auth.signOut(); location.reload();">ログアウト</li>
    </div>
    <button onclick="hideSettings()" style="width:100%; padding:15px; border-radius:30px; border:none; background:#eee; font-weight:bold; margin-top:20px;">閉じる</button>
</div>

<nav class="bottom-nav hidden" id="global-nav">
    <div class="nav-item active" onclick="switchTab('main')"><span class="nav-label">修行</span></div>
    <div class="nav-item" onclick="switchTab('chat')"><span class="nav-label">道場</span></div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { /* 省略: あなたのConfigを維持してください */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let userData = null;

    onAuthStateChanged(auth, user => { 
        if(user){ 
            currentUser = user;
            document.getElementById('user-photo').src = user.photoURL;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('global-nav').classList.remove('hidden');
            loadUserData();
        }
    });

    async function loadUserData() {
        const snap = await get(ref(db, 'users/' + currentUser.uid));
        // 初期値をセット（利回り5%、期間20年をデフォルトに）
        userData = snap.val() || { 
            days: 0, 
            monthlyAmount: 33333, 
            initialAmount: 0, 
            annualRate: 5, 
            targetYears: 20 
        };
        
        // フォームに値を反映
        document.getElementById('set-monthly').value = userData.monthlyAmount;
        document.getElementById('set-initial').value = userData.initialAmount || 0;
        document.getElementById('set-rate').value = userData.annualRate || 5;
        document.getElementById('set-years').value = userData.targetYears || 20;
        
        updateUI();
    }

    window.saveSettings = async () => {
        const updates = {
            monthlyAmount: Number(document.getElementById('set-monthly').value),
            initialAmount: Number(document.getElementById('set-initial').value),
            annualRate: Number(document.getElementById('set-rate').value),
            targetYears: Number(document.getElementById('set-years').value)
        };
        await update(ref(db, 'users/' + currentUser.uid), updates);
        userData = { ...userData, ...updates };
        updateUI();
        hideSettings();
        alert("設定を保存しました！未来が変わりました🌳");
    };

    function updateUI() {
        const days = userData.days || 0;
        document.getElementById('day-count').innerText = days + "日";
        
        // --- 1. 現在の守護額 (単純計算) ---
        const currentSaved = Math.floor(((userData.monthlyAmount / 30) * days) + (userData.initialAmount || 0));
        document.getElementById('saved-amount').innerText = "¥" + currentSaved.toLocaleString();

        // --- 2. 将来の守護予測 (複利計算) ---
        const r = (userData.annualRate / 100) / 12; // 月利
        const n = userData.targetYears * 12; // 月数
        const p = userData.monthlyAmount; // 毎月の積立
        const initial = userData.initialAmount || 0;
        
        // 複利計算式: 元金 * (1+r)^n + 積立額 * [((1+r)^n - 1) / r]
        const futureTotal = (initial * Math.pow(1 + r, n)) + (p * (Math.pow(1 + r, n) - 1) / r);
        
        document.getElementById('target-years-label').innerText = userData.targetYears;
        document.getElementById('future-total').innerText = "¥" + Math.floor(futureTotal).toLocaleString();
        
        document.getElementById('hold-btn').disabled = (userData.lastPressed === new Date().toDateString());
    }

    window.showSettings = () => document.getElementById('settings-modal').style.display = 'block';
    window.hideSettings = () => document.getElementById('settings-modal').style.display = 'none';
    window.switchTab = (tab) => { /* 前回同様のタブ切り替えロジック */ };
</script>
</body>
</html>
