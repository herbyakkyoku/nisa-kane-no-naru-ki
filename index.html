<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>カネノナルキ - NISA握力養成所</title>
    <style>
        :root { --primary: #2ecc71; --accent: #4285F4; --money: #f39c12; --bg: #f0f4f8; --danger: #e74c3c; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg); margin: 0; color: #333; display: flex; justify-content: center; min-height: 100vh; padding-bottom: 75px; }
        .app-container { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 480px; margin: 10px; position: relative; align-self: flex-start; }
        
        .user-profile-nav { position: absolute; top: 15px; right: 15px; cursor: pointer; z-index: 100; }
        .user-icon { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .badge { background: #eef4ff; color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 0.7rem; display: inline-block; margin-bottom: 5px; }
        #tree-display { font-size: 80px; margin: 10px 0; }
        
        @keyframes tree-bounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.3) translateY(-20px); }
            50% { transform: scale(0.9); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .bounce-animation { animation: tree-bounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .main-stats { display: flex; justify-content: space-around; margin-bottom: 1rem; background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #f0f0f0; }
        .stat-item p { margin: 0; font-size: 0.7rem; color: #999; }
        .stat-item div { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        
        .market-status { margin-bottom: 1.5rem; padding: 12px; border-radius: 12px; background: #fff5f5; border: 1px solid #ffe3e3; display: none; }
        .market-status.active { display: block; }
        .loss-title { font-size: 0.75rem; color: var(--danger); font-weight: bold; margin-bottom: 4px; }
        .loss-detail { font-size: 1.2rem; color: var(--danger); font-weight: 900; }
        .investment-label { font-size: 0.65rem; color: #777; margin-top: 4px; }

        .hold-button { background-color: var(--primary); color: white; border: none; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.2s; margin-bottom: 1rem; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2); }
        .hold-button:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; }
        
        #chat-section { border-top: 2px solid #f0f4f8; margin-top: 15px; padding-top: 15px; text-align: left; }
        #chat-messages { height: calc(100vh - 280px); overflow-y: auto; margin-bottom: 85px; padding-right: 5px; }
        .msg-unit { background: white; border: 1px solid #eee; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .msg-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .user-name { font-weight: bold; font-size: 0.85rem; }
        .msg-text { font-size: 0.9rem; line-height: 1.5; margin: 8px 0; white-space: pre-wrap; }
        .msg-actions { display: flex; gap: 12px; font-size: 0.75rem; color: #666; margin-top: 10px; }
        .action-btn { cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; background: #f8f9fa; }
        .action-icon { width: 16px; height: 16px; fill: currentColor; }

        .input-area { position: fixed; bottom: 65px; left: 0; width: 100%; background: white; padding: 10px 15px; box-sizing: border-box; border-top: 1px solid #eee; z-index: 900; }
        .input-row { display: flex; gap: 8px; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 0.9rem; }
        #chat-send-btn { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .bottom-nav { display: flex; justify-content: space-around; align-items: center; height: 65px; background: #ffffff; border-top: 1px solid #eee; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-icon { width: 24px; height: 24px; fill: currentColor; margin-bottom: 2px; display: block; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-label { font-size: 10px; font-weight: bold; }

        #settings-modal { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; }
        .modal-content { position: absolute; bottom: 0; background: white; width: 100%; padding: 2rem; box-sizing: border-box; border-radius: 30px 30px 0 0; }
        .input-group { margin: 15px 0; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="user-nav" class="user-profile-nav hidden" onclick="showSettings()">
        <img id="my-icon" class="user-icon" src="" alt="user">
    </div>

    <div id="login-section">
        <h1 style="margin-bottom:0.5rem;">🌳 カネノナルキ</h1>
        <p style="color: #666; font-size: 0.85rem;">〜NISA握力養成所〜</p>
        <button class="hold-button" id="btn-login" style="background-color: var(--accent);">Googleで入門する</button>
    </div>

    <div id="main-content">
        <div id="user-badge" class="badge">🐣 ひよっこ門下生</div>
        <div id="tree-display">🌱</div>
        
        <div class="main-stats">
            <div class="stat-item"><p>修行日数</p><div id="day-count">0日</div></div>
            <div class="stat-item"><p>累計・耐えた下落額</p><div id="saved-amount">¥0</div></div>
        </div>

        <div id="market-status-area" class="market-status">
            <div class="loss-title">⚠️ 本日の暴風雨（評価損）</div>
            <div id="today-loss-display" class="loss-detail">-0.0% (¥0)</div>
            <div id="investment-type-label" class="investment-label">対象: 全世界株式</div>
        </div>

        <button class="hold-button" id="hold-btn">今日も売らなかった！</button>
        <p style="font-size: 0.7rem; color: #999;">※売却ボタンはありません。アプリを消すまで修行です。</p>
    </div>

    <div id="chat-content" class="hidden">
        <div id="chat-section">
            <div id="chat-messages"></div>
            <div class="input-area">
                <div class="input-row">
                    <input type="text" id="chat-input" placeholder="今の心境を綴れ...">
                    <button id="chat-send-btn">送信</button>
                </div>
                <label style="font-size: 0.7rem; color: #888; margin-top: 5px; display: block;">
                    <input type="checkbox" id="mask-amount-check"> 耐えた額を隠して投稿
                </label>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav hidden" id="global-nav">
    <div class="nav-item active" id="nav-main" onclick="switchTab('main')">
        <svg class="nav-icon"><use href="#icon-home"></use></svg>
        <span class="nav-label">修行</span>
    </div>
    <div class="nav-item" id="nav-chat" onclick="switchTab('chat')">
        <svg class="nav-icon"><use href="#icon-chat"></use></svg>
        <span class="nav-label">道場</span>
    </div>
</nav>

<div id="settings-modal" onclick="hideSettings()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0;">🧘 修行プラン設定</h3>
        <div class="input-group">
            <label>毎月の積立額 (円)</label>
            <input type="number" id="setting-monthly" placeholder="33333">
        </div>
        <div class="input-group">
            <label>投資先</label>
            <select id="setting-target">
                <option value="all-country">eMAXIS Slim 全世界株式 (オルカン)</option>
                <option value="sp500">eMAXIS Slim 米国株式 (S&P500)</option>
            </select>
        </div>
        <button onclick="saveSettings()" style="width:100%; padding:15px; border-radius:30px; border:none; background:var(--primary); color:white; font-weight:bold; margin-top:10px;">修行内容を更新</button>
        <button onclick="auth.signOut(); location.reload();" style="width:100%; padding:10px; border:none; background:none; color:#e74c3c; margin-top:10px;">ログアウト</button>
        <button onclick="hideSettings()" style="width:100%; padding:10px; border:none; background:none; color:#999;">閉じる</button>
    </div>
</div>

<svg style="display: none;">
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
    <symbol id="icon-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></symbol>
    <symbol id="icon-like" viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></symbol>
</svg>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, set, update, onValue, push, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALG070NijPZ0U5RdfMXF_4dIJrEoFELqY",
        authDomain: "nisa-kane-no-naru-ki.firebaseapp.com",
        databaseURL: "https://nisa-kane-no-naru-ki-default-rtdb.firebaseio.com",
        projectId: "nisa-kane-no-naru-ki",
        appId: "1:466336366620:web:7fd41d4742cfbc56fc5fd9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let userData = null;
    let marketRates = { 'all-country': 1.0, 'sp500': 1.0 };

    window.switchTab = (tab) => {
        document.getElementById('main-content').classList.toggle('hidden', tab !== 'main');
        document.getElementById('chat-content').classList.toggle('hidden', tab !== 'chat');
        document.getElementById('nav-main').classList.toggle('active', tab === 'main');
        document.getElementById('nav-chat').classList.toggle('active', tab === 'chat');
    };

    window.showSettings = () => {
        document.getElementById('setting-monthly').value = userData.monthlyAmount || 33333;
        document.getElementById('setting-target').value = userData.investmentTarget || 'all-country';
        document.getElementById('settings-modal').style.display = 'block';
    };
    window.hideSettings = () => document.getElementById('settings-modal').style.display = 'none';

    window.saveSettings = async () => {
        const monthly = parseInt(document.getElementById('setting-monthly').value);
        const target = document.getElementById('setting-target').value;
        await update(ref(db, 'users/' + currentUser.uid), { monthlyAmount: monthly, investmentTarget: target });
        hideSettings();
        loadUserData();
    };

    function getBadgeInfo(days) {
        if (days >= 100) return { name: "伝説の投資家", emoji: "🏆" };
        if (days >= 50) return { name: "鉄の握力", emoji: "🦾" };
        if (days >= 30) return { name: "熟練門下生", emoji: "🥋" };
        if (days >= 7) return { name: "一人前門下生", emoji: "⚔️" };
        return { name: "ひよっこ門下生", emoji: "🐣" };
    }

    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    
    onAuthStateChanged(auth, user => { 
        if(user){ 
            currentUser = user; 
            document.getElementById('login-section').classList.add('hidden'); 
            document.getElementById('global-nav').classList.remove('hidden');
            document.getElementById('user-nav').classList.remove('hidden');
            document.getElementById('my-icon').src = user.photoURL || '';
            
            onValue(ref(db, 'market/rates'), (snap) => {
                if(snap.exists()) marketRates = snap.val();
                if(userData) updateUI(); 
            });
            loadUserData();
            initChat();
        } else {
            currentUser = null;
            document.getElementById('login-section').classList.remove('hidden'); 
            document.getElementById('global-nav').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }
    });

    async function loadUserData() {
        const snap = await get(ref(db, 'users/' + currentUser.uid));
        userData = snap.val() || { days: 0, lastPressed: null, monthlyAmount: 33333, investmentTarget: 'all-country', totalResistedLoss: 0 };
        updateUI();
    }

    function updateUI() {
        const days = userData.days || 0;
        const b = getBadgeInfo(days);
        document.getElementById('day-count').innerText = days + "日";
        document.getElementById('user-badge').innerText = b.emoji + " " + b.name;
        document.getElementById('saved-amount').innerText = "¥" + (userData.totalResistedLoss || 0).toLocaleString();

        // --- 設定に応じた下落情報の表示 ---
        const target = userData.investmentTarget || 'all-country';
        const rate = marketRates[target] || 1.0;
        const statusArea = document.getElementById('market-status-area');
        const targetLabel = target === 'sp500' ? '米国株式 (S&P500)' : '全世界株式 (オルカン)';
        document.getElementById('investment-type-label').innerText = `対象: ${targetLabel}`;

        if (rate < 1.0) {
            const lossPercent = ((1.0 - rate) * 100).toFixed(1);
            // 修行日数に基づいた概算の積立総額で計算
            const totalInvestment = (userData.monthlyAmount / 30) * Math.max(days, 1);
            const todayLossVal = Math.floor(totalInvestment * (1.0 - rate));
            
            document.getElementById('today-loss-display').innerText = `-${lossPercent}% (¥${todayLossVal.toLocaleString()})`;
            statusArea.classList.add('active');
        } else {
            statusArea.classList.remove('active');
        }

        const trees = ["🌱", "🌿", "🌲", "🌳", "💹"];
        document.getElementById('tree-display').innerText = trees[Math.min(Math.floor(days/10), 4)];
        document.getElementById('hold-btn').disabled = (userData.lastPressed === new Date().toDateString());
    }

    document.getElementById('hold-btn').onclick = async () => {
        const target = userData.investmentTarget || 'all-country';
        const rate = marketRates[target] || 1.0;
        
        let todayLoss = 0;
        if (rate < 1.0) {
            const totalInvestment = (userData.monthlyAmount / 30) * Math.max(userData.days, 1);
            todayLoss = Math.floor(totalInvestment * (1.0 - rate));
        }

        const newDays = (userData.days || 0) + 1;
        const newTotalLoss = (userData.totalResistedLoss || 0) + todayLoss;

        await update(ref(db, 'users/' + currentUser.uid), { 
            days: newDays, 
            totalResistedLoss: newTotalLoss,
            lastPressed: new Date().toDateString() 
        });
        
        const tree = document.getElementById('tree-display');
        tree.classList.add('bounce-animation');
        setTimeout(() => tree.classList.remove('bounce-animation'), 600);
        loadUserData();
    };

    function initChat() {
        onValue(query(ref(db, `messages/room_0`), limitToLast(50)), (snap) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = "";
            const messages = [];
            snap.forEach(child => { messages.unshift({ id: child.key, ...child.val() }); });
            messages.forEach(msg => { renderMsg(msg.id, msg, container); });
        });
    }

    function renderMsg(id, msg, container) {
        const div = document.createElement('div');
        div.className = 'msg-unit';
        const b = getBadgeInfo(msg.days);
        const likes = msg.likes ? Object.keys(msg.likes).length : 0;
        div.innerHTML = `
            <div class="msg-header">
                <div><span class="user-name">${msg.name}</span> <span style="font-size:0.6rem; color:var(--accent);">${b.emoji}${msg.days}日目</span></div>
                <div style="font-size:0.7rem; color:#999;">${msg.isAmountHidden ? '¥****' : '耐えた額: ¥'+(msg.amount || 0).toLocaleString()}</div>
            </div>
            <div class="msg-text">${msg.text}</div>
            <div class="msg-actions">
                <span class="action-btn" onclick="handleReaction('likes', '${id}')"><svg class="action-icon"><use href="#icon-like"></use></svg>${likes}</span>
            </div>
        `;
        container.appendChild(div);
    }

    document.getElementById('chat-send-btn').onclick = async () => {
        const input = document.getElementById('chat-input');
        if(!input.value) return;
        await push(ref(db, 'messages/room_0'), {
            name: currentUser.displayName, text: input.value, days: userData.days, 
            amount: userData.totalResistedLoss || 0,
            isAmountHidden: document.getElementById('mask-amount-check').checked,
            timestamp: serverTimestamp()
        });
        input.value = "";
    };

    window.handleReaction = async (type, id) => {
        if(!currentUser) return;
        const rRef = ref(db, `messages/room_0/${id}/${type}/${currentUser.uid}`);
        const snap = await get(rRef);
        await set(rRef, snap.exists() ? null : true);
    };
</script>
</body>
</html>
